<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Programmes Offered | TMU</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <section class="programmes-section" id="programmes">
            <!-- Background Layer -->
            <div class="bg-image-layer" aria-hidden="true"></div>

            <!-- Animated Mesh Blobs -->
            <div class="bg-mesh" aria-hidden="true">
                <div class="bg-blob bg-blob--1"></div>
                <div class="bg-blob bg-blob--2"></div>
                <div class="bg-blob bg-blob--3"></div>
            </div>

            <!-- Particle Layer -->
            <canvas
                id="particle-canvas"
                class="particle-canvas"
                aria-hidden="true"
            ></canvas>

            <div class="glass-shell">
                <!-- ═══════════════════════════════════════════
                     DESKTOP HEADER: Eyebrow + Title | Pills + Search
                     ═══════════════════════════════════════════ -->
                <header class="section-header">
                    <div class="header-titles">
                        <p class="section-eyebrow">
                            Explore Academic Excellence
                        </p>
                        <h1 class="section-title">
                            Programmes <span class="accent">Offered</span>
                        </h1>
                    </div>

                    <!-- Filter Row (Mobile Only) -->
                    <div class="header-filters mobile-only">
                        <p id="programme-count-mobile" class="programme-count">
                            0 Programmes
                        </p>
                        <div
                            class="level-filter level-filter-multi"
                            data-target="mobile"
                        >
                            <button class="filter-pill active" data-level="All">
                                All
                            </button>
                            <button class="filter-pill" data-level="UG">
                                UG
                            </button>
                            <button class="filter-pill" data-level="PG">
                                PG
                            </button>
                            <button class="filter-pill" data-level="Doctorate">
                                Doctorate
                            </button>
                        </div>
                    </div>
                </header>

                <!-- ═══════════════════════════════════════════
                     DESKTOP: Action Area (Dropdown + Filters/Search)
                     ═══════════════════════════════════════════ -->
                <div class="desktop-action-area desktop-only">
                    <!-- Top Row: Dropdown -->
                    <div class="desktop-college-dropdown">
                        <button
                            class="dcd-trigger"
                            id="dcd-trigger"
                            aria-expanded="false"
                            aria-haspopup="listbox"
                        >
                            <div class="dcd-trigger-left">
                                <span class="dcd-icon" id="dcd-icon">
                                    <svg
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="1.75"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path d="M2 20h20" />
                                        <path d="M12 3L3 8h18L12 3z" />
                                        <line x1="5" y1="8" x2="5" y2="20" />
                                        <line x1="9" y1="8" x2="9" y2="20" />
                                        <line x1="15" y1="8" x2="15" y2="20" />
                                        <line x1="19" y1="8" x2="19" y2="20" />
                                    </svg>
                                </span>
                                <div class="dcd-trigger-text">
                                    <span class="dcd-sublabel"
                                        >Browse by College</span
                                    >
                                    <span class="dcd-label" id="dcd-label"
                                        >All Colleges</span
                                    >
                                </div>
                            </div>
                            <svg
                                class="dcd-chevron"
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path d="M6 9l6 6 6-6" />
                            </svg>
                        </button>

                        <div class="dcd-backdrop" id="dcd-backdrop"></div>

                        <div
                            class="dcd-panel"
                            id="dcd-panel"
                            role="listbox"
                            aria-label="Select College"
                        >
                            <div class="dcd-list-wrap">
                                <div class="dcd-card-grid" id="dcd-list"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Row: Filters and Search -->
                    <div class="desktop-action-bottom">
                        <div
                            class="level-filter level-filter-multi"
                            data-target="desktop"
                        >
                            <button class="filter-pill active" data-level="All">
                                All
                            </button>
                            <button class="filter-pill" data-level="UG">
                                UG
                            </button>
                            <button class="filter-pill" data-level="PG">
                                PG
                            </button>
                            <button class="filter-pill" data-level="Doctorate">
                                Doctorate
                            </button>
                        </div>
                        <div class="search-wrap" aria-label="Search programmes">
                            <svg
                                class="search-icon"
                                width="15"
                                height="15"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                            <input
                                type="text"
                                id="search-input"
                                class="search-input"
                                placeholder="Search programmes…"
                                autocomplete="off"
                                aria-label="Search programmes"
                            />
                        </div>
                        <p id="programme-count" class="programme-count">
                            0 Programmes
                        </p>
                    </div>
                </div>

                <!-- ═══════════════════════════════════════════
                     MOBILE: Trigger Button (Hidden on Desktop)
                     ═══════════════════════════════════════════ -->
                <div class="mobile-college-trigger">
                    <button
                        class="mcd-trigger"
                        id="mcd-trigger"
                        aria-expanded="false"
                        aria-haspopup="listbox"
                    >
                        <div class="mcd-trigger-left">
                            <span class="mcd-icon">
                                <svg
                                    width="24"
                                    height="24"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.75"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="M2 20h20" />
                                    <path d="M12 3L3 8h18L12 3z" />
                                    <line x1="5" y1="8" x2="5" y2="20" />
                                    <line x1="9" y1="8" x2="9" y2="20" />
                                    <line x1="15" y1="8" x2="15" y2="20" />
                                    <line x1="19" y1="8" x2="19" y2="20" />
                                </svg>
                            </span>
                            <div class="mcd-trigger-text">
                                <span class="mcd-sublabel"
                                    >Browse by College</span
                                >
                                <span class="mcd-label" id="mcd-label"
                                    >Select College</span
                                >
                            </div>
                        </div>
                        <svg
                            class="mcd-chevron"
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M6 9l6 6 6-6" />
                        </svg>
                    </button>
                </div>

                <!-- ═══════════════════════════════════════════
                     MOBILE: Bottom Sheet Panel (Hidden on Desktop)
                     ═══════════════════════════════════════════ -->
                <div class="mobile-bottom-sheet" id="mobile-sheet">
                    <div class="mcd-backdrop" id="mcd-backdrop"></div>
                    <div
                        class="mcd-panel"
                        id="mcd-panel"
                        role="listbox"
                        aria-label="Select College"
                    >
                        <div class="mcd-panel-header">
                            <div
                                class="mcd-panel-handle-area"
                                id="mcd-close-btn"
                                role="button"
                                aria-label="Close"
                            >
                                <svg
                                    width="32"
                                    height="32"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <polyline
                                        points="6 9 12 15 18 9"
                                    ></polyline>
                                </svg>
                            </div>
                            <div class="mcd-search-wrap">
                                <svg
                                    class="mcd-search-icon"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <circle cx="11" cy="11" r="8" />
                                    <line
                                        x1="21"
                                        y1="21"
                                        x2="16.65"
                                        y2="16.65"
                                    />
                                </svg>
                                <input
                                    type="text"
                                    class="mcd-search"
                                    id="mcd-search"
                                    placeholder="Search colleges..."
                                    autocomplete="off"
                                />
                            </div>
                        </div>
                        <div class="mcd-list-wrap">
                            <div class="mcd-list" id="mcd-list"></div>
                        </div>
                    </div>
                </div>

                <!-- ═══════════════════════════════════════════
                     DESKTOP: Grid Content Area
                     ═══════════════════════════════════════════ -->
                <div class="content-layout">
                    <div class="programme-showcase">
                        <!-- Desktop: Grid subtitle + grid -->
                        <p
                            id="grid-subtitle"
                            class="grid-subtitle desktop-only"
                        >
                            Showing programmes…
                        </p>

                        <!-- Desktop Grid -->
                        <div
                            id="programme-grid"
                            class="programme-grid desktop-only"
                        ></div>

                        <!-- Desktop Load More -->
                        <div class="load-more-wrap desktop-only">
                            <button
                                id="load-more-btn"
                                class="load-more-btn"
                                aria-label="Load more programmes"
                            >
                                Load More
                                <svg
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="M12 5v14M5 12l7 7 7-7" />
                                </svg>
                            </button>
                        </div>

                        <!-- Mobile: Carousel (Hidden on Desktop) -->
                        <div class="card-carousel mobile-only">
                            <div id="card-track" class="card-track"></div>
                        </div>

                        <!-- Swipe Cue (Mobile) -->
                        <div class="swipe-cue mobile-only" id="swipe-cue">
                            Swipe to explore
                            <svg
                                width="14"
                                height="14"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path d="M5 12h14M12 5l7 7-7 7" />
                            </svg>
                        </div>

                        <!-- Mobile: Dot Pagination -->
                        <div
                            class="mobile-dot-nav mobile-only"
                            id="mobile-dot-nav"
                            role="tablist"
                        ></div>

                        <!-- Navigation Controls (Mobile) -->
                        <div class="nav-row mobile-only">
                            <button
                                id="prev-btn"
                                class="nav-btn"
                                aria-label="Previous"
                            >
                                <svg
                                    width="18"
                                    height="18"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="M15 18l-6-6 6-6" />
                                </svg>
                            </button>
                            <div class="progress-wrap">
                                <span class="progress-text" id="progress-text"
                                    >1 / 4</span
                                >
                                <div class="progress-track">
                                    <div
                                        id="progress-fill"
                                        class="progress-fill"
                                    ></div>
                                </div>
                            </div>
                            <button
                                id="next-btn"
                                class="nav-btn"
                                aria-label="Next"
                            >
                                <svg
                                    width="18"
                                    height="18"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="M9 18l6-6-6-6" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script src="data.js"></script>
        <script src="script.js"></script>
    </body>
</html>
